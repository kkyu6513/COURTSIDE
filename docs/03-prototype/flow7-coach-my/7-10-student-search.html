const SORT_OPTIONS = [
  { key: 'default', label: '기본순',       desc: '다음 레슨 일정순 · 미결제 우선' },
  { key: 'name',    label: '이름순',       desc: '가나다순' },
  { key: 'recent',  label: '최근 레슨순',  desc: '가장 최근에 레슨한 수강생 먼저' },
  { key: 'unpaid',  label: '미결제 우선',  desc: '미결제 · 예약금 수령 순으로 정렬' },
];

const UNPAID_ORDER = { unpaid: 0, deposit: 1, external: 2, paid: 3 };

function getSorted(students, sortKey) {
  const arr = [...students];
  if (sortKey === 'default') {
    arr.sort((a, b) => {
      if (a.nextLessonTs !== b.nextLessonTs) return a.nextLessonTs - b.nextLessonTs;
      return (UNPAID_ORDER[a.paymentStatus] ?? 3) - (UNPAID_ORDER[b.paymentStatus] ?? 3);
    });
  } else if (sortKey === 'name') {
    arr.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
  } else if (sortKey === 'recent') {
    arr.sort((a, b) => b.lastLessonTs - a.lastLessonTs);
  } else if (sortKey === 'unpaid') {
    arr.sort((a, b) => {
      const pd = (UNPAID_ORDER[a.paymentStatus] ?? 3) - (UNPAID_ORDER[b.paymentStatus] ?? 3);
      return pd !== 0 ? pd : a.nextLessonTs - b.nextLessonTs;
    });
  }
  return arr;
}

let currentQuery = '';
let currentSort  = 'default';

function paymentBadgeHtml(status) {
  if (status === 'paid')     return '<span class="badge-sm" style="background:#D1FAE5;color:#065F46;">결제완료</span>';
  if (status === 'deposit')  return '<span class="badge-sm" style="background:#FEF3C7;color:#92400E;">예약금 수령</span>';
  if (status === 'unpaid')   return '<span class="badge-sm" style="background:#FEE2E2;color:#EF4444;">미결제</span>';
  if (status === 'external') return '<span class="badge-sm" style="background:#DBEAFE;color:#1E40AF;">외부결제</span>';
  return '';
}

function lessonTypeBadgeHtml(type) {
  if (type === 'regular')  return '<span class="badge-sm" style="background:#F0FDFA;color:var(--green);">정규</span>';
  if (type === 'coupon')   return '<span class="badge-sm" style="background:#EDE9FE;color:#7C3AED;">쿠폰</span>';
  if (type === 'external') return '<span class="badge-sm" style="background:#EFF6FF;color:#2563EB;">외부</span>';
  return '';
}

function renderList(students) {
  const list = document.getElementById('student-list');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('result-count');

  if (!students.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    count.textContent = '검색 결과 없음';
    return;
  }

  empty.style.display = 'none';
  count.textContent = `수강생 ${students.length}명`;
  list.innerHTML = students.map(s => `
    <div class="student-card" onclick="showDetail(${s.id})">
      <div class="avatar" style="background:${s.avatarColor};">${s.initial}</div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
          <span style="font-size:15px;font-weight:700;color:var(--navy);">${s.name}</span>
          ${lessonTypeBadgeHtml(s.lessonType)}
          ${paymentBadgeHtml(s.paymentStatus)}
        </div>
        <div style="font-size:12px;color:var(--gray-400);">${s.age} · ${s.gender} · ${s.ntrp} · ${s.format}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
          <span style="font-size:12px;color:var(--gray-500);">회차 <strong style="color:var(--navy);">${s.session}</strong></span>
          <span style="font-size:11px;color:var(--gray-400);">다음 레슨 ${s.nextLesson}</span>
        </div>
      </div>
      <span style="font-size:16px;color:var(--gray-300);">›</span>
    </div>
  `).join('');
}

function getProcessed(query, sort) {
  const filtered = STUDENTS.filter(s =>
    !query ||
    s.name.includes(query) ||
    s.phone.replace(/-/g,'').includes(query.replace(/-/g,''))
  );
  return getSorted(filtered, sort);
}

function refresh() {
  renderList(getProcessed(currentQuery, currentSort));
}

function filterStudents(query) {
  currentQuery = query.trim();
  document.getElementById('clear-btn').style.display = currentQuery ? 'block' : 'none';
  refresh();
}

function applySort(btn, sortKey) {
  currentSort = sortKey;
  document.querySelectorAll('.s-chip').forEach(b => {
    b.style.background = '#fff';
    b.style.color = 'var(--gray-500)';
    b.style.border = '1px solid var(--gray-200)';
  });
  if (sortKey === 'unpaid') {
    btn.style.background = '#FEF2F2';
    btn.style.color = '#EF4444';
    btn.style.border = '1px solid #FECACA';
  } else {
    btn.style.background = 'var(--navy)';
    btn.style.color = '#fff';
    btn.style.border = 'none';
  }
  refresh();
}

function clearSearch() {
  document.getElementById('search-input').value = '';

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>2-2 코치 목록 — COURTSIDE</title>
<link rel="stylesheet" href="../common.css">
<style>
  .hide-scrollbar::-webkit-scrollbar{display:none;}
  .hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}

  /* 필터 바텀시트 */
  .filter-overlay {
    display:none;position:absolute;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.4);z-index:60;
  }
  .filter-overlay.show { display:block; }
  .filter-sheet {
    position:absolute;bottom:0;left:0;width:100%;background:#fff;
    border-radius:20px 20px 0 0;padding:20px 20px 36px;
    transform:translateY(100%);transition:transform 0.3s ease;
  }
  .filter-overlay.show .filter-sheet { transform:translateY(0); }
  .filter-sheet .handle { width:40px;height:4px;border-radius:2px;background:var(--gray-300);margin:0 auto 16px; }
  .filter-sheet .title { font-size:17px;font-weight:700;color:var(--navy);margin-bottom:16px; }

  .filter-option {
    display:inline-block;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;
    border:1.5px solid var(--gray-100);color:var(--gray-500);background:#fff;cursor:pointer;
    transition:all 0.15s;margin:0 6px 8px 0;
  }
  .filter-option.active { background:var(--green);color:#fff;border-color:var(--green); }

  .filter-radio {
    display:flex;align-items:center;gap:10px;padding:14px 0;
    border-bottom:1px solid var(--gray-100);cursor:pointer;font-size:14px;color:var(--navy);
  }
  .filter-radio:last-child { border-bottom:none; }
  .filter-radio .dot {
    width:20px;height:20px;border-radius:50%;border:2px solid var(--gray-300);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .filter-radio.active .dot { border-color:var(--green); }
  .filter-radio.active .dot::after {
    content:'';width:10px;height:10px;border-radius:50%;background:var(--green);
  }
</style>
</head>
<body>
<div class="device-wrap">
  <div class="device-label"><span class="device-num">8</span>코치 목록 (검색)</div>
  <div class="device" style="position:relative;overflow:hidden;background:var(--gray-50);">
    <div class="status-bar"><span class="time">9:41</span><div class="status-icons"><span>📶</span><span>🔋</span></div></div>
    <div class="screen">
      <div style="font-size:22px;font-weight:800;color:var(--navy);padding:20px 20px 0;">코치 찾기</div>

      <!-- 필터 칩 (좌우 스크롤) -->
      <div style="overflow-x:auto;padding:12px 20px;display:flex;gap:8px;-webkit-overflow-scrolling:touch;" class="hide-scrollbar">
        <span class="chip active" style="flex-shrink:0;white-space:nowrap;" onclick="openFilter('area')">📍 강남구 ▾</span>
        <span class="chip" style="flex-shrink:0;white-space:nowrap;" onclick="openFilter('gender')">성별 ▾</span>
        <span class="chip" style="flex-shrink:0;white-space:nowrap;" onclick="openFilter('experience')">경력 ▾</span>
      </div>

      <!-- 필터 적용 결과 카운트 -->
      <div style="padding:0 20px 8px;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:13px;color:var(--gray-500);">검색 결과 <span id="result-count" style="color:var(--green);font-weight:600;">0</span>명</span>
        <span id="active-filters" style="font-size:11px;color:var(--gray-400);"></span>
      </div>

      <!-- 코치 목록 (JS 동적 렌더링) -->
      <div id="coach-list" style="padding:0 20px;display:flex;flex-direction:column;gap:12px;"></div>
    </div>
    <!-- Bottom Nav (플로팅 라운딩) -->
    <div style="position:absolute;bottom:20px;left:16px;right:16px;z-index:50;">
      <div style="display:flex;align-items:center;justify-content:space-around;height:60px;background:#fff;border-radius:30px;box-shadow:0 2px 16px rgba(0,0,0,0.1);border:1px solid var(--gray-100);">
        <a href="2-1-home.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;padding:8px 16px;"><span style="font-size:18px;">🏠</span><span style="font-size:9px;color:var(--gray-400);font-weight:600;">홈</span></a>
        <a href="../flow4-chat/4-1-chat-list.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;padding:8px 16px;"><span style="font-size:18px;">💬</span><span style="font-size:9px;color:var(--gray-400);font-weight:600;">메시지</span></a>
        <a href="2-2-coach-list.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;padding:8px 16px;border-radius:20px;"><span style="font-size:18px;">🔍</span><span style="font-size:9px;color:var(--green);font-weight:700;">검색</span></a>
        <a href="../flow6-student-my/6-2-mypage.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;padding:8px 16px;"><span style="font-size:18px;">👤</span><span style="font-size:9px;color:var(--gray-400);font-weight:600;">마이</span></a>
      </div>
    </div>

    <!-- ═══ 필터 바텀시트들 ═══ -->

    <!-- 지역 필터 -->
    <div id="filter-area" class="filter-overlay" onclick="closeFilter('area')">
      <div class="filter-sheet" onclick="event.stopPropagation()">
        <div class="handle"></div>
        <div class="title">지역</div>
        <div style="display:flex;gap:8px;margin-bottom:16px;">
          <select id="filter-sido" class="input-field" style="flex:1;" onchange="updateFilterSigungu()">
            <option value="">시·도 전체</option>
            <option value="서울특별시" selected>서울특별시</option>
            <option value="부산광역시">부산광역시</option>
            <option value="대구광역시">대구광역시</option>
            <option value="인천광역시">인천광역시</option>
            <option value="광주광역시">광주광역시</option>
            <option value="대전광역시">대전광역시</option>
            <option value="울산광역시">울산광역시</option>
            <option value="세종특별자치시">세종특별자치시</option>
            <option value="경기도">경기도</option>
            <option value="강원특별자치도">강원특별자치도</option>
            <option value="충청북도">충청북도</option>
            <option value="충청남도">충청남도</option>
            <option value="전북특별자치도">전북특별자치도</option>
            <option value="전라남도">전라남도</option>
            <option value="경상북도">경상북도</option>
            <option value="경상남도">경상남도</option>
            <option value="제주특별자치도">제주특별자치도</option>
          </select>
          <select id="filter-sigungu" class="input-field" style="flex:1;">
            <option value="">시·군·구 전체</option>
          </select>
        </div>
        <button class="btn-primary" style="height:48px;font-size:14px;" onclick="applyFilter('area')">적용하기</button>
      </div>
    </div>

    <!-- 성별 필터 -->
    <div id="filter-gender" class="filter-overlay" onclick="closeFilter('gender')">
      <div class="filter-sheet" onclick="event.stopPropagation()">
        <div class="handle"></div>
        <div class="title">성별</div>
        <div style="margin-bottom:20px;">
          <span class="filter-option active" onclick="selectFilter(this)">전체</span>
          <span class="filter-option" onclick="selectFilter(this)">남성</span>
          <span class="filter-option" onclick="selectFilter(this)">여성</span>
        </div>
        <button class="btn-primary" style="height:48px;font-size:14px;" onclick="applyFilter('gender')">적용하기</button>
      </div>
    </div>

    <!-- 경력 필터 -->
    <div id="filter-experience" class="filter-overlay" onclick="closeFilter('experience')">
      <div class="filter-sheet" onclick="event.stopPropagation()">
        <div class="handle"></div>
        <div class="title">경력</div>
        <div style="margin-bottom:20px;">
          <span class="filter-option active" onclick="selectFilter(this)">전체</span>
          <span class="filter-option" onclick="selectFilter(this)">1~3년</span>
          <span class="filter-option" onclick="selectFilter(this)">3~5년</span>
          <span class="filter-option" onclick="selectFilter(this)">5~10년</span>
          <span class="filter-option" onclick="selectFilter(this)">10년+</span>
        </div>
        <button class="btn-primary" style="height:48px;font-size:14px;" onclick="applyFilter('experience')">적용하기</button>
      </div>
    </div>

  </div>
</div>


<!-- 시뮬레이션: 빈 상태 확인 버튼 -->
<div style="position:fixed;top:50%;right:16px;transform:translateY(-50%);display:flex;flex-direction:column;gap:4px;z-index:200;">
  <button onclick="currentFilter.sido='서울특별시';currentFilter.sigungu='';currentFilter.gender='';currentFilter.experienceMin=0;currentFilter.experienceMax=99;renderCoachList();this.style.background='var(--green)';this.nextElementSibling.style.background='#ccc'" style="padding:6px 10px;border-radius:8px;border:none;font-size:10px;font-weight:600;color:#fff;background:var(--green);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.2);">결과있음</button>
  <button onclick="currentFilter.sido='제주특별자치도';currentFilter.sigungu='서귀포시';currentFilter.gender='MALE';currentFilter.experienceMin=10;currentFilter.experienceMax=99;renderCoachList();this.style.background='var(--coral)';this.previousElementSibling.style.background='#ccc'" style="padding:6px 10px;border-radius:8px;border:none;font-size:10px;font-weight:600;color:#fff;background:#ccc;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.2);">빈상태</button>
</div>

<script>
/**
 * ═══════════════════════════════════════════════════
 * 코치 목록 — 필터 기반 동적 렌더링
 * ═══════════════════════════════════════════════════
 * 필터 적용하기 → 선택 조건으로 코치 데이터 필터링 → 목록 갱신
 * 실제: GET /api/coaches?sido=&sigungu=&gender=&experienceMin=&experienceMax=
 */

// 시뮬레이션 코치 데이터
const allCoaches = [
  { name: '김민수', sido: '서울특별시', sigungu: '강남구', gender: 'MALE', genderLabel: '남성', experience: 10, bg: 'linear-gradient(135deg,var(--green),var(--sky))', emoji: '🏸' },
  { name: '이서연', sido: '서울특별시', sigungu: '강남구', gender: 'FEMALE', genderLabel: '여성', experience: 7, bg: 'linear-gradient(135deg,var(--orange),var(--yellow))', emoji: '🎾' },
  { name: '박준호', sido: '서울특별시', sigungu: '서초구', gender: 'MALE', genderLabel: '남성', experience: 5, bg: 'linear-gradient(135deg,var(--pink),var(--coral))', emoji: '🏆' },
  { name: '최지원', sido: '서울특별시', sigungu: '송파구', gender: 'FEMALE', genderLabel: '여성', experience: 8, bg: 'linear-gradient(135deg,var(--coral),var(--orange))', emoji: '⭐' },
  { name: '한도윤', sido: '서울특별시', sigungu: '용산구', gender: 'MALE', genderLabel: '남성', experience: 4, bg: 'linear-gradient(135deg,var(--sky),var(--info))', emoji: '🎯' },
  { name: '정하은', sido: '서울특별시', sigungu: '강서구', gender: 'FEMALE', genderLabel: '여성', experience: 3, bg: 'linear-gradient(135deg,#D1FAE5,var(--green))', emoji: '🆕' },
  { name: '오승민', sido: '서울특별시', sigungu: '관악구', gender: 'MALE', genderLabel: '남성', experience: 2, bg: 'linear-gradient(135deg,#DBEAFE,var(--sky))', emoji: '🌱' },
  { name: '윤서준', sido: '서울특별시', sigungu: '마포구', gender: 'MALE', genderLabel: '남성', experience: 12, bg: 'linear-gradient(135deg,var(--purple),#a78bfa)', emoji: '🏅' },
  { name: '김태영', sido: '경기도', sigungu: '성남시 분당구', gender: 'MALE', genderLabel: '남성', experience: 15, bg: 'linear-gradient(135deg,var(--navy),var(--sky))', emoji: '🎾' },
  { name: '이수진', sido: '부산광역시', sigungu: '해운대구', gender: 'FEMALE', genderLabel: '여성', experience: 6, bg: 'linear-gradient(135deg,var(--orange),var(--coral))', emoji: '⭐' },
];

// 현재 필터 상태
const currentFilter = {
  sido: '서울특별시',
  sigungu: '',
  gender: '',
  experienceMin: 0,
  experienceMax: 99,
};

function renderCoachList() {
  const filtered = allCoaches.filter(c => {
    if (currentFilter.sido && c.sido !== currentFilter.sido) return false;
    if (currentFilter.sigungu && c.sigungu !== currentFilter.sigungu) return false;
    if (currentFilter.gender && c.gender !== currentFilter.gender) return false;
    if (c.experience < currentFilter.experienceMin || c.experience > currentFilter.experienceMax) return false;
    return true;
  });

  const container = document.getElementById('coach-list');
  document.getElementById('result-count').textContent = filtered.length;

  // 적용된 필터 표시
  const tags = [];
  if (currentFilter.sido) tags.push(currentFilter.sido);
  if (currentFilter.sigungu) tags.push(currentFilter.sigungu);
  if (currentFilter.gender) tags.push(currentFilter.gender === 'MALE' ? '남성' : '여성');
  if (currentFilter.experienceMin > 0 || currentFilter.experienceMax < 99) {
    if (currentFilter.experienceMax >= 99) tags.push(currentFilter.experienceMin + '년+');
    else tags.push(currentFilter.experienceMin + '~' + currentFilter.experienceMax + '년');
  }
  document.getElementById('active-filters').textContent = tags.length > 0 ? tags.join(' · ') : '';

  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px 20px;">'
      + '<div style="font-size:48px;margin-bottom:16px;">🔍</div>'
      + '<div style="font-size:17px;font-weight:700;color:var(--navy);margin-bottom:6px;">조건에 맞는 코치가 없습니다</div>'
      + '<div style="font-size:13px;color:var(--gray-500);line-height:1.6;">다른 조건으로 검색하거나<br>필터를 초기화해보세요</div>'
      + '<div style="font-size:12px;color:var(--gray-400);margin-top:12px;padding:10px;background:var(--gray-50);border-radius:10px;">적용된 필터: ' + (tags.length > 0 ? tags.join(' · ') : '없음') + '</div>'
      + '<div style="margin-top:16px;">'
      + '<button onclick="resetAllFilters()" style="padding:10px 24px;border-radius:999px;border:none;background:var(--green);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">필터 초기화</button>'
      + '</div></div>';
    return;
  }

  container.innerHTML = filtered.map(c =>
    '<a href="2-3-coach-detail.html" style="background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.07);display:flex;gap:14px;text-decoration:none;">'
    + '<div style="width:56px;height:56px;border-radius:50%;flex-shrink:0;background:' + c.bg + ';display:flex;align-items:center;justify-content:center;font-size:24px;">' + c.emoji + '</div>'
    + '<div style="flex:1;">'
    + '<div style="font-size:15px;font-weight:700;color:var(--navy);">' + c.name + '</div>'
    + '<div style="font-size:12px;color:var(--gray-500);margin-top:2px;">' + c.sido + ' ' + c.sigungu + '</div>'
    + '<div style="font-size:12px;color:var(--gray-400);margin-top:2px;">' + c.genderLabel + ' · 경력 ' + c.experience + '년</div>'
    + '</div></a>'
  ).join('');
}

// 초기 렌더링
renderCoachList();

/**
 * 필터 바텀시트
 */
function openFilter(type) {
  document.getElementById('filter-' + type).classList.add('show');
}

function closeFilter(type) {
  document.getElementById('filter-' + type).classList.remove('show');
}

function selectFilter(el) {
  el.parentElement.querySelectorAll('.filter-option').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
}

function applyFilter(type) {
  // 필터 값 수집
  if (type === 'area') {
    currentFilter.sido = document.getElementById('filter-sido').value;
    currentFilter.sigungu = document.getElementById('filter-sigungu').value;
    // 칩 텍스트 갱신
    const areaChip = document.querySelector('[onclick="openFilter(\'area\')"]');
    const label = currentFilter.sigungu || currentFilter.sido || '전체';
    areaChip.textContent = '📍 ' + label + ' ▾';
    areaChip.classList.toggle('active', !!currentFilter.sido);
  }

  if (type === 'gender') {
    const selected = document.querySelector('#filter-gender .filter-option.active');
    const val = selected.textContent;
    currentFilter.gender = val === '남성' ? 'MALE' : val === '여성' ? 'FEMALE' : '';
    const genderChip = document.querySelector('[onclick="openFilter(\'gender\')"]');
    genderChip.textContent = (val === '전체' ? '성별' : val) + ' ▾';
    genderChip.classList.toggle('active', val !== '전체');
  }

  if (type === 'experience') {
    const selected = document.querySelector('#filter-experience .filter-option.active');
    const val = selected.textContent;
    const expChip = document.querySelector('[onclick="openFilter(\'experience\')"]');
    if (val === '전체') { currentFilter.experienceMin = 0; currentFilter.experienceMax = 99; }
    else if (val === '1~3년') { currentFilter.experienceMin = 1; currentFilter.experienceMax = 3; }
    else if (val === '3~5년') { currentFilter.experienceMin = 3; currentFilter.experienceMax = 5; }
    else if (val === '5~10년') { currentFilter.experienceMin = 5; currentFilter.experienceMax = 10; }
    else if (val === '10년+') { currentFilter.experienceMin = 10; currentFilter.experienceMax = 99; }
    expChip.textContent = (val === '전체' ? '경력' : val) + ' ▾';
    expChip.classList.toggle('active', val !== '전체');
  }

  closeFilter(type);
  renderCoachList();

  console.log('필터 적용:', JSON.stringify(currentFilter));
}

/** 필터 전체 초기화 */
function resetAllFilters() {
  currentFilter.sido = '';
  currentFilter.sigungu = '';
  currentFilter.gender = '';
  currentFilter.experienceMin = 0;
  currentFilter.experienceMax = 99;

  // 칩 텍스트 복원
  document.querySelector('[onclick="openFilter(\'area\')"]').textContent = '📍 지역 ▾';
  document.querySelector('[onclick="openFilter(\'area\')"]').classList.remove('active');
  document.querySelector('[onclick="openFilter(\'gender\')"]').textContent = '성별 ▾';
  document.querySelector('[onclick="openFilter(\'gender\')"]').classList.remove('active');
  document.querySelector('[onclick="openFilter(\'experience\')"]').textContent = '경력 ▾';
  document.querySelector('[onclick="openFilter(\'experience\')"]').classList.remove('active');

  // 바텀시트 옵션 초기화
  document.getElementById('filter-sido').value = '';
  document.getElementById('filter-sigungu').innerHTML = '<option value="">시·군·구 전체</option>';
  document.querySelectorAll('#filter-gender .filter-option, #filter-experience .filter-option').forEach((o, i) => {
    o.classList.toggle('active', o.textContent === '전체');
  });

  renderCoachList();
}

function updateFilterSigungu() {
  const sido = document.getElementById('filter-sido').value;
  const sigungu = document.getElementById('filter-sigungu');
  const regionData = {
    "서울특별시": ["강남구","강동구","강북구","강서구","관악구","광진구","구로구","금천구","노원구","도봉구","동대문구","동작구","마포구","서대문구","서초구","성동구","성북구","송파구","양천구","영등포구","용산구","은평구","종로구","중구","중랑구"],

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>1-2 로그인 — COURTSIDE</title>
<link rel="stylesheet" href="../common.css">
<style>
  /* 바텀시트 오버레이 */
  .bottomsheet-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); z-index: 50;
    display: none; /* 기본 숨김 */
  }
  .bottomsheet-overlay.show { display: block; }

  /* 바텀시트 */
  .bottomsheet {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: #fff; border-radius: 20px 20px 0 0;
    padding: 24px 20px 36px; z-index: 51;
    transform: translateY(100%); transition: transform 0.3s ease;
  }
  .bottomsheet-overlay.show .bottomsheet { transform: translateY(0); }

  .bottomsheet .handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: var(--gray-300); margin: 0 auto 20px;
  }

  /* 약관 체크 */
  .terms-check {
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    padding: 8px 0;
  }
  .terms-check input { width: 18px; height: 18px; accent-color: var(--green); }
</style>
</head>
<body>

<div class="device-wrap">
  <div class="device-label"><span class="device-num">2</span>로그인</div>
  <div class="device" style="position:relative;">
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons"><span>📶</span><span>🔋</span></div>
    </div>
    <div class="screen screen-white" style="display:flex;flex-direction:column;padding-bottom:0;">

      <!-- Logo Area -->
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 20px;">
        <div style="font-size:48px;margin-bottom:16px;">🎾</div>
        <div style="font-size:24px;font-weight:800;color:var(--navy);">COURTSIDE</div>
        <div style="font-size:14px;color:var(--gray-500);margin-top:8px;text-align:center;line-height:1.6;">
          다시 만나서 반가워요!<br>소셜 계정으로 로그인하세요
        </div>
      </div>

      <!-- Login Buttons -->
      <div style="padding:0 20px 24px;display:flex;flex-direction:column;gap:12px;">
        <button class="social-btn social-kakao" onclick="showSignupSheet('카카오')">💬 카카오로 로그인</button>
        <button class="social-btn social-naver" onclick="showSignupSheet('네이버')">N 네이버로 로그인</button>
      </div>

      <!-- Divider -->
      <div style="padding:0 20px;display:flex;align-items:center;gap:12px;">
        <div style="flex:1;height:1px;background:var(--gray-100);"></div>
        <span style="font-size:12px;color:var(--gray-400);">또는</span>
        <div style="flex:1;height:1px;background:var(--gray-100);"></div>
      </div>

      <!-- Signup Link -->
      <div style="padding:20px 20px 48px;text-align:center;">
        <div style="font-size:14px;color:var(--gray-500);margin-bottom:12px;">아직 계정이 없으신가요?</div>
        <a href="1-2b-signup.html" style="display:block;width:100%;height:52px;border-radius:999px;border:2px solid var(--green);background:#fff;color:var(--green);font-size:15px;font-weight:700;font-family:inherit;line-height:48px;text-decoration:none;text-align:center;">
          회원가입하기
        </a>
      </div>

    </div>

    <!--
      미가입 사용자 바텀시트
      ─────────────────────────────────────────────
      소셜 로그인 → API 응답 isNewUser=true 일 때 표시
      소셜 인증은 이미 완료된 상태이므로 약관 동의만 받고 가입 진행
      → 소셜 인증 2번 하지 않음 (UX 개선)
    -->
    <div class="bottomsheet-overlay" id="signup-sheet" onclick="hideSignupSheet(event)">
      <div class="bottomsheet" onclick="event.stopPropagation()">
        <div class="handle"></div>

        <!-- 소셜 프로필 정보 -->
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
          <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--sky));display:flex;align-items:center;justify-content:center;font-size:20px;">😊</div>
          <div>
            <div style="font-size:16px;font-weight:700;color:var(--navy);" id="sheet-name">홍길동</div>
            <div style="font-size:13px;color:var(--gray-500);" id="sheet-email">hong@email.com</div>
          </div>
          <span class="badge" style="margin-left:auto;padding:4px 10px;font-size:11px;" id="sheet-provider">카카오</span>
        </div>

        <!-- 안내 메시지 -->
        <div style="background:#FFF7ED;border-radius:12px;padding:14px;margin-bottom:20px;">
          <div style="font-size:14px;font-weight:600;color:#92400E;">가입된 계정이 없습니다</div>
          <div style="font-size:13px;color:#B45309;margin-top:4px;">회원가입을 진행하시겠습니까?</div>
        </div>

        <!-- 안내 -->
        <div style="background:var(--gray-50);border-radius:12px;padding:14px;margin-bottom:20px;">
          <div style="font-size:13px;color:var(--gray-400);line-height:1.5;text-align:center;">약관 동의는 프로필 등록 단계에서 진행됩니다</div>
        </div>

        <!-- CTA -->
        <div style="display:flex;gap:10px;">
          <button class="btn-secondary" style="flex:1;height:48px;font-size:14px;" onclick="hideSignupSheet()">취소</button>
          <a href="1-3-role-select.html" class="btn-primary" style="flex:2;height:48px;font-size:14px;display:flex;align-items:center;justify-content:center;text-decoration:none;">회원가입 진행</a>
        </div>
      </div>
    </div>

  </div>
</div>


<script>
/**
 * 미가입 사용자 바텀시트 시뮬레이션
 * 실제: POST /api/auth/login/{provider} → isNewUser=true → 바텀시트 표시
 * 프로토타입: 소셜 로그인 버튼 클릭 시 바로 바텀시트 표시
 */
function showSignupSheet(provider) {
  const providerColors = {
    '카카오': 'background:#FEE500;color:#191919;',
    '네이버': 'background:#03C75A;color:#fff;',
    '애플': 'background:#000;color:#fff;'
  };
  document.getElementById('sheet-provider').textContent = provider;
  document.getElementById('sheet-provider').style.cssText = providerColors[provider] || '';
  document.getElementById('signup-sheet').classList.add('show');
}

function hideSignupSheet(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('signup-sheet').classList.remove('show');
}

function toggleAll() {
  const allChk = document.getElementById('chk-all');
  document.querySelectorAll('.bottomsheet input[type="checkbox"]').forEach(c => c.checked = allChk.checked);
  updateSignupBtn();
}

function updateAll() {
  const all = document.querySelectorAll('.bottomsheet input[type="checkbox"]:not(#chk-all)');
  const allChecked = [...all].every(c => c.checked);
  document.getElementById('chk-all').checked = allChecked;
  updateSignupBtn();
}

function updateSignupBtn() {
  const required = document.querySelectorAll('.terms-required');
  const allRequired = [...required].every(c => c.checked);
  const btn = document.getElementById('btn-signup');
  btn.style.pointerEvents = allRequired ? 'auto' : 'none';
  btn.style.opacity = allRequired ? '1' : '0.5';
}
</script>

<script src="../site-nav.js"></script>
</body>
</html>

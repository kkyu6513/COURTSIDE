<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>1-4 학생 프로필 등록 — COURTSIDE</title>
<link rel="stylesheet" href="../common.css">
</head>
<body>

<div class="device-wrap">
  <div class="device-label"><span class="device-num">4</span>학생 프로필 등록</div>
  <div class="device">
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons"><span>📶</span><span>🔋</span></div>
    </div>
    <div class="top-nav">
      <a class="back" href="1-3-role-select.html">←</a>
      <span class="title">기본 정보 입력</span>
      <span class="action"></span>
    </div>
    <div class="screen screen-white" style="flex:1;overflow-y:auto;padding-bottom:0;">
      <!-- Step -->
      <div class="step-indicator">
        <div class="step-dot done"></div>
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
      </div>

      <!-- Form -->
      <div class="page-pad" style="display:flex;flex-direction:column;gap:24px;padding-bottom:20px;">
        <!-- 성별 -->
        <div>
          <label class="input-label">성별</label>
          <div style="display:flex;gap:8px;">
            <span class="chip active">남성</span>
            <span class="chip">여성</span>
            <span class="chip">기타</span>
          </div>
        </div>

        <!-- 연령대 -->
        <div>
          <label class="input-label">연령대</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <span class="chip">10대</span>
            <span class="chip active">20대</span>
            <span class="chip">30대</span>
            <span class="chip">40대</span>
            <span class="chip">50대+</span>
          </div>
        </div>

        <!-- NTRP -->
        <div>
          <label class="input-label">
            NTRP 레벨
            <span style="font-size:11px;color:var(--info);cursor:pointer;position:relative;" onclick="document.getElementById('tooltip').style.display=document.getElementById('tooltip').style.display==='block'?'none':'block'">
              ⓘ NTRP란?
            </span>
          </label>
          <div id="tooltip" style="display:none;background:var(--navy);color:#fff;padding:12px 16px;border-radius:12px;font-size:12px;line-height:1.6;margin-bottom:8px;">
            <strong>NTRP (National Tennis Rating Program)</strong><br>
            1.0~2.0: 입문~초급 (기본 스트로크 연습 단계)<br>
            2.5~3.0: 중급 (랠리 가능, 서브 안정적)<br>
            3.5~4.0: 중상급 (전략적 플레이 가능)<br>
            4.5+: 상급 (대회 출전 수준)
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <span class="chip active">1.0~2.0</span>
            <span class="chip">2.5~3.0</span>
            <span class="chip">3.5~4.0</span>
            <span class="chip">4.5+</span>
          </div>
        </div>

        <!-- 레슨 희망 지역 -->
        <div>
          <label class="input-label">레슨 희망 지역</label>
          <div style="display:flex;gap:8px;">
            <select class="input-field" style="flex:1;" id="sido" onchange="updateSigungu()">
              <option value="">시·도 선택</option>
              <option value="서울특별시">서울특별시</option>
              <option value="부산광역시">부산광역시</option>
              <option value="대구광역시">대구광역시</option>
              <option value="인천광역시">인천광역시</option>
              <option value="광주광역시">광주광역시</option>
              <option value="대전광역시">대전광역시</option>
              <option value="울산광역시">울산광역시</option>
              <option value="세종특별자치시">세종특별자치시</option>
              <option value="경기도">경기도</option>
              <option value="강원특별자치도">강원특별자치도</option>
              <option value="충청북도">충청북도</option>
              <option value="충청남도">충청남도</option>
              <option value="전북특별자치도">전북특별자치도</option>
              <option value="전라남도">전라남도</option>
              <option value="경상북도">경상북도</option>
              <option value="경상남도">경상남도</option>
              <option value="제주특별자치도">제주특별자치도</option>
            </select>
            <select class="input-field" style="flex:1;" id="sigungu">
              <option value="">시·군·구 선택</option>
            </select>
          </div>
        </div>

        <!-- 레슨 목표 (어드민 관리 항목) -->
        <div>
          <label class="input-label">레슨 목표 (다중 선택)</label>
          <!--
            레슨 목표 데이터 구조 (어드민에서 CRUD 관리)
            ┌─────────────────────────────────────────────────┐
            │  LessonGoal (어드민 코드 관리 테이블)              │
            ├─────────────────────────────────────────────────┤
            │  goal.id        : Number   — PK (자동 생성)       │
            │  goal.code       : String   — 고유 코드 (영문 키)  │
            │  goal.label      : String   — 노출 텍스트          │
            │  goal.isActive   : Boolean  — 활성 여부            │
            │  goal.sortOrder  : Number   — 정렬 순서            │
            │  goal.createdAt  : DateTime — 등록일               │
            │  goal.updatedAt  : DateTime — 수정일               │
            └─────────────────────────────────────────────────┘
          -->
          <div style="display:flex;gap:8px;flex-wrap:wrap;" id="lesson-goals"></div>
        </div>

        <!-- 약관 동의 -->
        <div>
          <label class="input-label" style="margin-bottom:10px;">약관 동의</label>
          <div style="background:var(--gray-50);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;">
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding-bottom:10px;border-bottom:1px solid var(--gray-100);">
              <input type="checkbox" id="chk-all-student" style="width:20px;height:20px;accent-color:var(--green);" onchange="toggleAllStudent()">
              <span style="font-size:14px;font-weight:700;color:var(--navy);">전체 동의</span>
            </label>
            <div style="display:flex;align-items:center;gap:10px;">
              <input type="checkbox" class="terms-req-student" style="width:16px;height:16px;accent-color:var(--green);" onchange="updateStudentBtn()">
              <span style="font-size:13px;color:var(--gray-500);flex:1;">[필수] 이용약관 동의</span>
              <a href="terms-detail.html?code=TERMS_OF_SERVICE" style="font-size:12px;color:var(--gray-400);text-decoration:none;">보기 ›</a>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <input type="checkbox" class="terms-req-student" style="width:16px;height:16px;accent-color:var(--green);" onchange="updateStudentBtn()">
              <span style="font-size:13px;color:var(--gray-500);flex:1;">[필수] 개인정보 처리방침 동의</span>
              <a href="terms-detail.html?code=PRIVACY_POLICY" style="font-size:12px;color:var(--gray-400);text-decoration:none;">보기 ›</a>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <input type="checkbox" style="width:16px;height:16px;accent-color:var(--green);" onchange="updateStudentBtn()">
              <span style="font-size:13px;color:var(--gray-500);flex:1;">[선택] 마케팅 정보 수신 동의</span>
              <a href="terms-detail.html?code=MARKETING" style="font-size:12px;color:var(--gray-400);text-decoration:none;">보기 ›</a>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Bottom CTA — device flex 자식으로 하단 고정 (스크롤 영역 밖) -->
    <div style="padding:12px 20px 32px;background:#fff;border-top:1px solid var(--gray-100);flex-shrink:0;">
      <a href="1-4b-signup-complete.html" id="btn-complete" class="btn-primary" style="display:block;text-align:center;text-decoration:none;line-height:52px;pointer-events:none;opacity:0.5;">완료</a>
    </div>
  </div>
</div>


<script>
const regionData = {

  "부산광역시": ["강서구","금정구","기장군","남구","동구","동래구","부산진구","북구","사상구","사하구","서구","수영구","연제구","영도구","중구","해운대구"],
  "대구광역시": ["남구","달서구","달성군","동구","북구","서구","수성구","중구","군위군"],
  "인천광역시": ["강화군","계양구","남동구","동구","미추홀구","부평구","서구","연수구","옹진군","중구"],
  "광주광역시": ["광산구","남구","동구","북구","서구"],
  "대전광역시": ["대덕구","동구","서구","유성구","중구"],
  "울산광역시": ["남구","동구","북구","울주군","중구"],
  "세종특별자치시": ["세종시"],
  "경기도": ["가평군","고양시 덕양구","고양시 일산동구","고양시 일산서구","과천시","광명시","광주시","구리시","군포시","김포시","남양주시","동두천시","부천시","성남시 분당구","성남시 수정구","성남시 중원구","수원시 권선구","수원시 영통구","수원시 장안구","수원시 팔달구","시흥시","안산시 단원구","안산시 상록구","안성시","안양시 동안구","안양시 만안구","양주시","양평군","여주시","연천군","오산시","용인시 기흥구","용인시 수지구","용인시 처인구","의왕시","의정부시","이천시","파주시","평택시","포천시","하남시","화성시"],
  "강원특별자치도": ["강릉시","고성군","동해시","삼척시","속초시","양구군","양양군","영월군","원주시","인제군","정선군","철원군","춘천시","태백시","평창군","홍천군","화천군","횡성군"],
  "충청북도": ["괴산군","단양군","보은군","영동군","옥천군","음성군","제천시","증평군","진천군","청주시 상당구","청주시 서원구","청주시 청원구","청주시 흥덕구","충주시"],
  "충청남도": ["계룡시","공주시","금산군","논산시","당진시","보령시","부여군","서산시","서천군","아산시","예산군","천안시 동남구","천안시 서북구","청양군","태안군","홍성군"],
  "전북특별자치도": ["고창군","군산시","김제시","남원시","무주군","부안군","순창군","완주군","익산시","임실군","장수군","전주시 덕진구","전주시 완산구","정읍시","진안군"],
  "전라남도": ["강진군","고흥군","곡성군","광양시","구례군","나주시","담양군","목포시","무안군","보성군","순천시","신안군","여수시","영광군","영암군","완도군","장성군","장흥군","진도군","함평군","해남군","화순군"],
  "경상북도": ["경산시","경주시","고령군","구미시","김천시","문경시","봉화군","상주시","성주군","안동시","영덕군","영양군","영주시","영천시","예천군","울릉군","울진군","의성군","청도군","청송군","칠곡군","포항시 남구","포항시 북구"],
  "경상남도": ["거제시","거창군","고성군","김해시","남해군","밀양시","사천시","산청군","양산시","의령군","진주시","창녕군","창원시 마산합포구","창원시 마산회원구","창원시 성산구","창원시 의창구","창원시 진해구","통영시","하동군","함안군","함양군","합천군"],
  "제주특별자치도": ["제주시","서귀포시"]
};

/**
 * 레슨 목표 데이터 (어드민에서 CRUD 관리 → API 응답 시뮬레이션)
 *
 * 데이터 소스: [ADMIN_CRUD] — 어드민에서 등록/수정/삭제/정렬 가능
 */
const lessonGoals = [
  { code: 'FOREHAND',   label: '포핸드 교정', isActive: true, sortOrder: 1 },
  { code: 'SERVE',      label: '서브 연습',   isActive: true, sortOrder: 2 },
  { code: 'FITNESS',    label: '체력 향상',   isActive: true, sortOrder: 3 },
  { code: 'STRATEGY',   label: '경기 전략',   isActive: true, sortOrder: 4 },
  { code: 'DIET',       label: '다이어트',    isActive: true, sortOrder: 5 },
  { code: 'HOBBY',      label: '재미/취미',   isActive: true, sortOrder: 6 },
  { code: 'BACKHAND',   label: '백핸드 교정', isActive: true, sortOrder: 7 },
  { code: 'FOOTWORK',   label: '풋워크',      isActive: true, sortOrder: 8 },
  { code: 'DOUBLES',    label: '복식 전략',   isActive: true, sortOrder: 9 },
  { code: 'MENTAL',     label: '멘탈 강화',   isActive: true, sortOrder: 10 },
];

function renderLessonGoals() {
  const container = document.getElementById('lesson-goals');
  const selected = ['FOREHAND', 'FITNESS']; // 사용자 선택 시뮬레이션
  lessonGoals
    .filter(g => g.isActive)
    .sort((a, b) => a.sortOrder - b.sortOrder)
    .forEach(goal => {
      const chip = document.createElement('span');
      chip.className = 'chip' + (selected.includes(goal.code) ? ' active' : '');
      chip.textContent = goal.label;
      chip.dataset.code = goal.code;
      chip.onclick = () => chip.classList.toggle('active');
      container.appendChild(chip);
    });
}
renderLessonGoals();

/** 약관 전체 동의 토글 */
function toggleAllStudent() {
  const allChk = document.getElementById('chk-all-student');
  const parent = allChk.closest('div[style]');
  parent.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = allChk.checked);
  updateStudentBtn();
}

/** 약관 개별 변경 → 전체 동의 + 완료 버튼 상태 */
function updateStudentBtn() {
  const all = document.querySelectorAll('.terms-req-student');
  const allChecked = [...all].every(c => c.checked);
  const allInputs = document.querySelectorAll('#chk-all-student').item(0).closest('div[style]').querySelectorAll('input:not(#chk-all-student)');
  document.getElementById('chk-all-student').checked = [...allInputs].every(c => c.checked);
  const btn = document.getElementById('btn-complete');
  btn.style.pointerEvents = allChecked ? 'auto' : 'none';
  btn.style.opacity = allChecked ? '1' : '0.5';
}

function updateSigungu() {
  const sido = document.getElementById('sido').value;
  const sigungu = document.getElementById('sigungu');
  sigungu.innerHTML = '<option value="">시·군·구 선택</option>';
  if (sido && regionData[sido]) {
    regionData[sido].forEach(function(name) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sigungu.appendChild(opt);
    });
  }
}
</script>
<script src="../site-nav.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>약관 상세 — COURTSIDE</title>
<link rel="stylesheet" href="../common.css">
</head>
<body>

<div class="device-wrap">
  <div class="device-label"><span class="device-num">T</span>약관 상세</div>
  <div class="device">
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons"><span>📶</span><span>🔋</span></div>
    </div>
    <div class="top-nav">
      <span class="back" style="cursor:pointer;" onclick="history.back()">←</span>
      <span class="title" id="terms-title">이용약관</span>
      <span class="action"></span>
    </div>
    <div class="screen screen-white" style="flex:1;overflow-y:auto;padding-bottom:0;">
      <!--
        약관 본문 데이터 — 어드민에서 관리 (Terms 테이블)
        ┌──────────────────────────────────────────────────┐
        │  Terms 테이블에서 동적 로딩                         │
        ├──────────────────────────────────────────────────┤
        │  API: GET /api/terms/:code                       │
        │  → code별 isActive=true인 최신 버전 반환           │
        │  → title, content(HTML), version, effectiveDate  │
        │  → content를 innerHTML로 렌더링                   │
        └──────────────────────────────────────────────────┘
      -->

      <!-- 버전 정보 -->
      <div style="padding:16px 20px 0;display:flex;justify-content:space-between;align-items:center;">
        <span id="terms-version" style="font-size:12px;color:var(--gray-400);">버전 1.0</span>
        <span id="terms-date" style="font-size:12px;color:var(--gray-400);">시행일: 2026.04.01</span>
      </div>

      <!-- 약관 본문 (어드민에서 입력한 HTML 렌더링 영역) -->
      <div id="terms-content" style="padding:20px;font-size:14px;color:var(--navy);line-height:1.8;">
        <!-- 기본: 이용약관 본문 (시뮬레이션) -->
      </div>
    </div>

    <!-- 하단 고정 버튼 -->
    <div style="padding:12px 20px 32px;background:#fff;border-top:1px solid var(--gray-100);flex-shrink:0;">
      <button class="btn-primary" onclick="history.back()">확인</button>
    </div>
  </div>
</div>

<script>
/**
 * 약관 상세 페이지
 * URL 파라미터로 약관 코드를 받아 해당 약관을 렌더링
 * 예: terms-detail.html?code=TERMS_OF_SERVICE
 *
 * 실제 구현: GET /api/terms/:code → Terms.content (HTML) 렌더링
 * 프로토타입: URL 파라미터 기반 시뮬레이션 데이터
 */

const termsData = {
  TERMS_OF_SERVICE: {
    title: '이용약관',
    version: 'v1.0',
    effectiveDate: '2026.04.01',
    content: `
      <h2 style="font-size:17px;font-weight:700;margin-bottom:12px;">제1조 (목적)</h2>
      <p>이 약관은 COURTSIDE(이하 "회사")가 제공하는 테니스 코치 매칭 서비스(이하 "서비스")의 이용과 관련하여 회사와 이용자 간의 권리, 의무 및 책임사항을 규정함을 목적으로 합니다.</p>

      <h2 style="font-size:17px;font-weight:700;margin:24px 0 12px;">제2조 (정의)</h2>
      <p>① "서비스"란 회사가 제공하는 테니스 코치-수강생 매칭 플랫폼을 말합니다.</p>
      <p>② "이용자"란 이 약관에 따라 서비스를 이용하는 회원을 말합니다.</p>
      <p>③ "코치"란 서비스에 등록된 테니스 레슨 제공자를 말합니다.</p>
      <p>④ "수강생"이란 코치의 레슨을 신청하는 이용자를 말합니다.</p>

      <h2 style="font-size:17px;font-weight:700;margin:24px 0 12px;">제3조 (약관의 효력 및 변경)</h2>
      <p>① 이 약관은 서비스 화면에 게시하거나 기타의 방법으로 이용자에게 공지함으로써 효력이 발생합니다.</p>
      <p>② 회사는 관련 법령에 위배되지 않는 범위에서 이 약관을 개정할 수 있으며, 변경된 약관은 제1항과 같은 방법으로 공지합니다.</p>
      <p>③ 이용자는 변경된 약관에 동의하지 않을 경우 서비스 이용을 중단하고 탈퇴할 수 있습니다.</p>

      <h2 style="font-size:17px;font-weight:700;margin:24px 0 12px;">제4조 (회원가입)</h2>
      <p>① 이용자는 소셜 로그인(카카오, 네이버)을 통해 회원가입을 할 수 있습니다.</p>
      <p>② 회원가입 시 수강생 또는 코치 역할을 선택하며, 이후 변경이 가능합니다.</p>

      <h2 style="font-size:17px;font-weight:700;margin:24px 0 12px;">제5조 (서비스의 제공)</h2>
      <p>① 회사는 다음과 같은 서비스를 제공합니다.</p>
      <p style="padding-left:16px;">1. 코치 프로필 등록 및 검색</p>
      <p style="padding-left:16px;">2. 레슨 신청 및 예약 관리</p>
      <p style="padding-left:16px;">3. 코치-수강생 간 1:1 채팅</p>
      <p style="padding-left:16px;">4. 결제 및 구독 서비스</p>
      <p style="padding-left:16px;">5. 리뷰 및 평가 시스템</p>

      <h2 style="font-size:17px;font-weight:700;margin:24px 0 12px;">제6조 (이용자의 의무)</h2>
      <p>① 이용자는 타인의 개인정보를 도용하여 서비스를 이용해서는 안 됩니다.</p>
      <p>② 이용자는 서비스를 통해 허위 정보를 등록하거나 타인을 기만해서는 안 됩니다.</p>

      <h2 style="font-size:17px;font-weight:700;margin:24px 0 12px;">제7조 (서비스 이용 제한)</h2>
      <p>회사는 이용자가 본 약관의 의무를 위반하거나 서비스의 정상적인 운영을 방해한 경우 서비스 이용을 제한할 수 있습니다.</p>
    `
  },
  PRIVACY_POLICY: {
    title: '개인정보 처리방침',
    version: 'v1.0',
    effectiveDate: '2026.04.01',
    content: `
      <h2 style="font-size:17px;font-weight:700;margin-bottom:12px;">1. 개인정보의 수집 및 이용 목적</h2>
      <p>COURTSIDE(이하 "회사")는 다음의 목적을 위해 개인정보를 수집·이용합니다.</p>
      <p style="padding-left:16px;">• 회원 가입 및 관리: 소셜 로그인 인증, 회원 식별</p>
      <p style="padding-left:16px;">• 서비스 제공: 코치 매칭, 레슨 예약, 결제 처리</p>
      <p style="padding-left:16px;">• 마케팅 및 광고: 이벤트 정보 제공 (동의 시)</p>

      <h2 style="font-size:17px;font-weight:700;margin:24px 0 12px;">2. 수집하는 개인정보 항목</h2>
      <p><strong>필수 항목:</strong></p>
      <p style="padding-left:16px;">• 소셜 로그인 정보 (이메일, 이름, 프로필 사진)</p>
      <p style="padding-left:16px;">• 성별, 연령대</p>
      <p style="padding-left:16px;">• 레슨 희망 지역</p>
      <p><strong>선택 항목:</strong></p>
      <p style="padding-left:16px;">• 전화번호, 자격증 정보 (코치)</p>

      <h2 style="font-size:17px;font-weight:700;margin:24px 0 12px;">3. 개인정보의 보유 및 이용 기간</h2>
      <p>① 회원 탈퇴 시 즉시 파기합니다.</p>
      <p>② 단, 관련 법령에 의해 보존이 필요한 경우 해당 기간 동안 보관합니다.</p>
      <p style="padding-left:16px;">• 계약 또는 청약 철회에 관한 기록: 5년</p>
      <p style="padding-left:16px;">• 대금 결제 및 재화 공급에 관한 기록: 5년</p>
      <p style="padding-left:16px;">• 소비자 불만 또는 분쟁 처리에 관한 기록: 3년</p>

      <h2 style="font-size:17px;font-weight:700;margin:24px 0 12px;">4. 개인정보의 제3자 제공</h2>
      <p>회사는 이용자의 동의 없이 개인정보를 제3자에게 제공하지 않습니다. 다만, 다음의 경우는 예외로 합니다.</p>
      <p style="padding-left:16px;">• 법령에 의한 요청이 있는 경우</p>
      <p style="padding-left:16px;">• 결제 처리를 위해 토스페이먼츠에 제공하는 경우</p>

      <h2 style="font-size:17px;font-weight:700;margin:24px 0 12px;">5. 개인정보 보호책임자</h2>
      <p>성명: 홍길동 / 이메일: privacy@courtside.kr</p>
    `
  },
  MARKETING: {
    title: '마케팅 정보 수신 동의',
    version: 'v1.0',
    effectiveDate: '2026.04.01',
    content: `
      <h2 style="font-size:17px;font-weight:700;margin-bottom:12px;">마케팅 정보 수신 동의</h2>
      <p>COURTSIDE는 서비스 이용에 필요한 정보 외에 마케팅 목적의 광고성 정보를 발송할 수 있습니다.</p>

      <h2 style="font-size:17px;font-weight:700;margin:24px 0 12px;">수신 항목</h2>
      <p style="padding-left:16px;">• 카카오 알림톡을 통한 이벤트·프로모션 안내</p>
      <p style="padding-left:16px;">• 신규 코치 추천 알림</p>
      <p style="padding-left:16px;">• 할인 쿠폰 및 혜택 안내</p>

      <h2 style="font-size:17px;font-weight:700;margin:24px 0 12px;">안내 사항</h2>
      <p>① 마케팅 수신 동의는 선택사항이며, 동의하지 않아도 서비스 이용에 제한이 없습니다.</p>
      <p>② 수신 동의 후에도 마이페이지 > 알림 설정에서 언제든지 변경할 수 있습니다.</p>
      <p>③ 광고성 정보 수신 동의 날짜 및 수단은 기록·보관됩니다.</p>
    `
  }
};

// URL 파라미터에서 약관 코드 추출
const params = new URLSearchParams(window.location.search);
const code = params.get('code') || 'TERMS_OF_SERVICE';
const data = termsData[code];

if (data) {
  document.getElementById('terms-title').textContent = data.title;
  document.getElementById('terms-version').textContent = data.version;
  document.getElementById('terms-date').textContent = '시행일: ' + data.effectiveDate;
  document.getElementById('terms-content').innerHTML = data.content;
  document.title = data.title + ' — COURTSIDE';
}
</script>

<script src="../site-nav.js"></script>
</body>
</html>
